[tool.ruff]
target-version = "py310"
line-length = 100
select = ["E", "F", "W", "I", "UP", "B", "SIM", "C4", "N"]
ignore = ["E501", "B008", "N806"]
exclude = ["notebooks/", "alembic/"]

[tool.ruff.isort]
known-first-party = ["src", "api"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
no_strict_optional = true
exclude = ["notebooks/", "alembic/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
]
markers = [
    "slow: marks tests as slow (deselect with '-m not slow')",
    "integration: marks integration tests requiring external services",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::UserWarning:librosa",
]

[tool.coverage.run]
source = ["src", "api"]
omit = ["tests/*", "notebooks/*", "alembic/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

[tool.bandit]
exclude_dirs = ["tests", "notebooks"]
skips = ["B101"]   # allow assert in tests
